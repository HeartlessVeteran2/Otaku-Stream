name: CI

on:
  push:
    branches: [main]
  # No branch filter here (unlike push, above): stacked PRs target each other's branches, not
  # main, so restricting this to branches: [main] would leave those PRs with no CI at all.
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup-android-build

      - name: Lint (debug, all modules)
        run: ./gradlew lintDebug --stacktrace

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup-android-build

      - name: Run JVM unit tests (parsers, unpacker, migration guard)
        run: ./gradlew testDebugUnitTest --stacktrace

  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup-android-build

      - name: Assemble debug APK
        run: ./gradlew clean :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build-release:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup-android-build

      # Release build. Without signing secrets it falls back to the debug key, so the output is a
      # signed, installable app-release.apk (not the old -unsigned artifact).
      - name: Assemble release APK
        run: ./gradlew clean :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
